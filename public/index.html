<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .filters-wrap {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filter-select {
      flex: 1;
      min-width: 140px;
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.9rem;
      color: #333;
      background: white;
      cursor: pointer;
    }

    .filter-select:focus {
      outline: none;
      border-color: #e94560;
    }

    .search-wrap {
      position: relative;
      margin-bottom: 16px;
    }

    .search-wrap .search-input {
      margin-bottom: 0;
      padding-right: 36px;
    }

    .search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #aaa;
      font-size: 1.1rem;
      display: none;
      line-height: 1;
    }

    .search-clear:hover {
      color: #e94560;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #333;
    }

    header {
      background: #e8651a;
      color: white;
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 1.4rem;
      cursor: pointer;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-btns {
      display: flex;
      gap: 8px;
    }

    .nav-btn {
      background: transparent;
      border: 1px solid #fff;
      color: white;
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .nav-btn:hover,
    .nav-btn.active {
      background: white;
      border-color: white;
      color: #e8651a;
    }

    .lang-switcher button {
      background: transparent;
      border: 1px solid #fff;
      color: white;
      padding: 4px 10px;
      margin-left: 6px;
      border-radius: 4px;
      cursor: pointer;
    }

    .user-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f0f2f5;
      font-size: 0.9rem;
    }

    .user-item .user-email {
      color: #333;
    }

    .user-item .user-date {
      color: #aaa;
      font-size: 0.8rem;
      margin-top: 2px;
    }

    .delete-btn {
      background: transparent;
      border: 1px solid #e94560;
      color: #e94560;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .delete-btn:hover {
      background: #e94560;
      color: white;
    }

    .lang-switcher button.active {
      background: white;
      border-color: white;
      color: #e8651a;
    }

    /* Login page */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
    }

    .login-box {
      background: white;
      border-radius: 12px;
      padding: 40px 36px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
      width: 100%;
      max-width: 380px;
    }

    .login-box h2 {
      font-size: 1.4rem;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .login-box p {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .login-lang {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .login-lang button {
      background: transparent;
      border: 1px solid #ddd;
      color: #555;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .login-lang button.active {
      background: #4a90d9;
      border-color: #4a90d9;
      color: white;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
    }

    .form-group input:focus {
      border-color: #e94560;
    }

    .btn-primary {
      width: 100%;
      padding: 11px;
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }

    .btn-primary:hover {
      background: #357abd;
    }

    .btn-primary:hover {
      background: #c73652;
    }

    .login-error {
      color: #e94560;
      font-size: 0.85rem;
      margin-top: 12px;
      text-align: center;
    }

    .container {
      max-width: 700px;
      margin: 32px auto;
      padding: 0 20px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 48px 28px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .stat-card .number {
      font-size: 4rem;
      font-weight: 700;
      color: #4a90d9;
    }

    .stat-card .label {
      font-size: 1.1rem;
      color: #666;
      margin-top: 8px;
    }

    .list-page {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .list-page h2 {
      font-size: 1.3rem;
      margin-bottom: 16px;
      color: #1a1a2e;
      border-bottom: 2px solid #4a90d9;
      padding-bottom: 8px;
    }

    .search-input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 0.95rem;
    }

    .person-list {
      max-height: calc(100vh - 280px);
      overflow-y: auto;
    }

    .person-item {
      padding: 12px 14px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #f0f2f5;
    }

    .person-item:hover {
      background: #f0f2f5;
    }

    .person-item .name {
      font-weight: 500;
      font-size: 1rem;
    }

    .person-item .sub {
      font-size: 0.82rem;
      color: #888;
      margin-top: 2px;
    }

    .badge {
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 10px;
      background: #e8f5e9;
      color: #2e7d32;
      white-space: nowrap;
    }

    .badge.inactive {
      background: #fce4ec;
      color: #c62828;
    }

    /* Admin panel */
    .admin-box {
      background: white;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      max-width: 480px;
    }

    .admin-box h2 {
      font-size: 1.3rem;
      margin-bottom: 8px;
      color: #1a1a2e;
      border-bottom: 2px solid #4a90d9;
      padding-bottom: 8px;
      margin-bottom: 24px;
    }

    .success-msg {
      color: #2e7d32;
      font-size: 0.9rem;
      margin-top: 12px;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: white;
      border-radius: 12px;
      padding: 32px;
      max-width: 500px;
      width: 90%;
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h2 {
      font-size: 1.3rem;
      margin-bottom: 20px;
      color: #1a1a2e;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 1.4rem;
      cursor: pointer;
      color: #888;
      background: none;
      border: none;
    }

    .detail-row {
      display: flex;
      padding: 10px 0;
      border-bottom: 1px solid #f0f2f5;
    }

    .detail-label {
      width: 160px;
      color: #888;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .detail-value {
      font-weight: 500;
      font-size: 0.9rem;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .logout-btn {
      background: transparent;
      border: 1px solid #fff;
      color: white;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .logout-btn:hover {
      background: #e94560;
      border-color: #e94560;
    }
  </style>
</head>

<body>

  <!-- LOGIN PAGE -->
  <div id="login-page" class="login-wrap">
    <div class="login-box">
      <div class="login-lang">
        <button onclick="setLoginLang('en')" id="login-btn-en" class="active">EN</button>
        <button onclick="setLoginLang('es')" id="login-btn-es">ES</button>
        <button onclick="setLoginLang('fr')" id="login-btn-fr">FR</button>
      </div>
      <h2>🏫 School Dashboard</h2>
      <p id="login-subtitle">Sign in to continue</p>
      <div class="form-group">
        <label id="login-label-email">Email</label>
        <input type="email" id="login-email" placeholder="admin@school.com" autocomplete="off">
      </div>
      <div class="form-group">
        <label id="login-label-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="off"
          onkeydown="if(event.key==='Enter') doLogin()">
      </div>
      <button class="btn-primary" id="login-btn-submit" onclick="doLogin()">Sign in</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none">
    <header>
      <h1 id="header-title" onclick="goHome()">🏫 School Dashboard</h1>
      <div class="header-right">
        <div class="nav-btns">
          <button class="nav-btn" id="nav-students" onclick="goPage('students')">Students</button>
          <button class="nav-btn" id="nav-staff" onclick="goPage('staff')">Staff</button>
          <button class="nav-btn" id="nav-admin" onclick="goPage('admin')">⚙️ Admin</button>
        </div>
        <div class="lang-switcher">
          <button onclick="setLang('en')" id="btn-en" class="active">EN</button>
          <button onclick="setLang('es')" id="btn-es">ES</button>
          <button onclick="setLang('fr')" id="btn-fr">FR</button>
        </div>
        <button class="logout-btn" onclick="doLogout()">Вийти</button>
      </div>
    </header>

    <div class="container">
      <!-- Home -->
      <div class="page active" id="page-home">
        <div class="stats">
          <div class="stat-card" onclick="goPage('students')">
            <div class="number" id="students-count">—</div>
            <div class="label" id="label-students">Students</div>
          </div>
          <div class="stat-card" onclick="goPage('staff')">
            <div class="number" id="staff-count">—</div>
            <div class="label" id="label-staff">Staff</div>
          </div>
        </div>
      </div>

      <!-- Students -->
      <div class="page" id="page-students">
        <div class="list-page">
          <div
            style="display:flex; justify-content:space-between; align-items:center; border-bottom: 2px solid #e94560; padding-bottom:8px; margin-bottom:16px;">
            <h2 id="title-students" style="margin:0; border:none; padding:0;">Students</h2>
            <button id="btn-add-student" class="nav-btn"
              style="border-color:#4a90d9; color:#4a90d9; background:transparent;"
              onmouseover="this.style.background='#4a90d9'; this.style.color='white';"
              onmouseout="this.style.background='transparent'; this.style.color='#4a90d9';" onclick="openAddStudent()">+
              Add student</button>
          </div>
          <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 16px;">
            <div style="position: relative; flex: 2;">
              <input class="search-input" id="search-students" placeholder="Search..." oninput="filterList('students')"
                style="margin-bottom:0; padding-right:32px;">
              <button class="search-clear" id="clear-students" onclick="clearSearch('students')">×</button>
            </div>
            <select class="filter-select" id="filter-students-campus" onchange="filterList('students')"
              style="flex:1; margin-bottom:0;">
              <option value="">— Campus —</option>
            </select>
            <select class="filter-select" id="filter-students-sex" onchange="filterList('students')"
              style="flex:1; margin-bottom:0;">
              <option value="">— Gender —</option>
            </select>
          </div>
          <div class="person-list" id="list-students"></div>
        </div>
      </div>

      <!-- Staff -->
      <div class="page" id="page-staff">
        <div class="list-page">
          <h2 id="title-staff">Staff</h2>
          <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 16px;">
            <div style="position: relative; flex: 2;">
              <input class="search-input" id="search-staff" placeholder="Search..." oninput="filterList('staff')"
                style="margin-bottom:0; padding-right:32px;">
              <button class="search-clear" id="clear-staff" onclick="clearSearch('staff')">×</button>
            </div>
            <select class="filter-select" id="filter-staff-campus" onchange="filterList('staff')"
              style="flex:1; margin-bottom:0;">
              <option value="">— Campus —</option>
            </select>
            <select class="filter-select" id="filter-staff-category" onchange="filterList('staff')"
              style="flex:1; margin-bottom:0;">
              <option value="">— Category —</option>
            </select>
          </div>
          <div class="person-list" id="list-staff"></div>
        </div>
      </div>

      <!-- Admin -->
      <div class="page" id="page-admin">
        <div class="admin-box">
          <h2 id="admin-create-title">⚙️ Create User</h2>
          <div class="form-group">
            <label id="new-email-label">New user email</label>
            <input type="email" id="new-email" placeholder="user@school.com" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label id="new-password-label">Password</label>
            <input type="password" id="new-password" placeholder="minimum 6 characters" autocomplete="new-password">
          </div>
          <button class="btn-primary" id="create-user-btn" onclick="createUser()">Create user</button>
          <div id="admin-msg"></div>
        </div>

        <div class="admin-box" style="margin-top: 24px;">
          <h2 id="admin-users-title">👥 Users</h2>
          <div id="users-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <!-- Add Student Modal -->
  <div class="modal-overlay" id="add-student-overlay" onclick="closeAddStudent(event)">
    <div class="modal">
      <button class="modal-close" onclick="closeAddStudent()">✕</button>
      <h2 id="add-student-title">➕ Add student</h2>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;">
        <div class="form-group">
          <label id="label-apellido">Last name</label>
          <input type="text" id="new-apellido" autocomplete="off">
        </div>
        <div class="form-group">
          <label id="label-nombre">First name</label>
          <input type="text" id="new-nombre" autocomplete="off">
        </div>
        <div class="form-group">
          <label id="label-dob">Date of birth</label>
          <input type="date" id="new-dob">
        </div>
        <div class="form-group">
          <label id="label-gender">Gender</label>
          <select id="new-gender" class="filter-select" style="width:100%; margin:0;">
            <option value="Femenino">Female</option>
            <option value="Masculino">Male</option>
          </select>
        </div>
        <div class="form-group">
          <label id="label-campus-s">Campus</label>
          <select id="new-campus-s" class="filter-select" style="width:100%; margin:0;">
          </select>
        </div>
        <div class="form-group">
          <label id="label-enroll">Enrollment date</label>
          <input type="date" id="new-enroll">
        </div>
      </div>
      <div id="add-student-msg"></div>
      <div style="display:flex; gap:10px; margin-top:8px;">
        <button class="btn-primary" onclick="saveStudent()" id="save-student-btn">Save student</button>
        <button onclick="closeAddStudent()" id="cancel-student-btn"
          style="flex:1; padding:11px; background:transparent; border:1px solid #ddd; border-radius:6px; cursor:pointer; font-size:1rem;">Cancel</button>
      </div>
    </div>
  </div>
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <h2 id="modal-name"></h2>
      <div id="modal-content"></div>
    </div>
  </div>

  <script>
    const i18n = {
      en: {
        title: '🏫 School Dashboard', students: 'Students', staff: 'Staff',
        search: 'Search...', campus: 'Campus', status: 'Status', category: 'Category',
        area: 'Teaching Area', active: 'Active', inactive: 'Inactive',
        inscripcion: 'Enrollment Date', nacimiento: 'Date of Birth', sexo: 'Gender',
        inicio: 'Start Date', laboral: 'Work Status', id: 'ID',
        male: 'Male', female: 'Female',
        admin: '⚙️ Admin', logout: 'Sign out',
        adminTitle: '⚙️ Create User', newEmail: 'New user email',
        newPassword: 'Password', minChars: 'minimum 6 characters',
        createBtn: 'Create user',
        addStudent: '+ Add student',
        addStudentTitle: '➕ Add student',
        lastNameLabel: 'Last name',
        firstNameLabel: 'First name',
        dobLabel: 'Date of birth',
        genderLabel: 'Gender',
        campusLabel: 'Campus',
        enrollLabel: 'Enrollment date',
        saveStudent: 'Save student',
        cancelBtn: 'Cancel',
        usersTitle: 'Users',
        deleteBtn: 'Delete',
        youLabel: '(you)',
        changePass: 'Change password',
        newPassPlaceholder: 'New password',
        savePass: 'Save',
        allCampus: '— Campus —',
        allGender: '— Gender —',
        allCategory: '— Category —'
      },
      es: {
        title: '🏫 Panel Escolar', students: 'Alumnos', staff: 'Personal',
        search: 'Buscar...', campus: 'Campus', status: 'Estado', category: 'Categoría',
        area: 'Área de enseñanza', active: 'Activo', inactive: 'Inactivo',
        inscripcion: 'Fecha de inscripción', nacimiento: 'Fecha de nacimiento', sexo: 'Sexo',
        inicio: 'Fecha de inicio', laboral: 'Estado laboral', id: 'ID',
        male: 'Masculino', female: 'Femenino',
        admin: '⚙️ Admin', logout: 'Salir',
        adminTitle: '⚙️ Crear usuario', newEmail: 'Email del nuevo usuario',
        newPassword: 'Contraseña', minChars: 'mínimo 6 caracteres',
        createBtn: 'Crear usuario',
        addStudent: '+ Agregar alumno',
        addStudentTitle: '➕ Agregar alumno',
        lastNameLabel: 'Apellido',
        firstNameLabel: 'Nombre',
        dobLabel: 'Fecha de nacimiento',
        genderLabel: 'Sexo',
        campusLabel: 'Campus',
        enrollLabel: 'Fecha de inscripción',
        saveStudent: 'Guardar alumno',
        cancelBtn: 'Cancelar',
        usersTitle: 'Usuarios',
        deleteBtn: 'Eliminar',
        youLabel: '(tú)',
        changePass: 'Cambiar contraseña',

        savePass: 'Guardar',
        allCampus: '— Campus —',
        allGender: '— Sexo —',
        allCategory: '— Categoría —'
      },
      fr: {
        title: '🏫 Tableau de bord', students: 'Élèves', staff: 'Personnel',
        search: 'Rechercher...', campus: 'Campus', status: 'Statut', category: 'Catégorie',
        area: "Domaine d'enseignement", active: 'Actif', inactive: 'Inactif',
        inscripcion: "Date d'inscription", nacimiento: 'Date de naissance', sexo: 'Sexe',
        inicio: 'Date de début', laboral: 'Statut professionnel', id: 'ID',
        male: 'Masculin', female: 'Féminin',
        admin: '⚙️ Admin', logout: 'Se déconnecter',
        adminTitle: '⚙️ Créer un utilisateur', newEmail: 'Email du nouvel utilisateur',
        newPassword: 'Mot de passe', minChars: 'minimum 6 caractères',
        createBtn: 'Créer un utilisateur',
        addStudent: '+ Ajouter un élève',
        addStudentTitle: '➕ Ajouter un élève',
        lastNameLabel: 'Nom de famille',
        firstNameLabel: 'Prénom',
        dobLabel: 'Date de naissance',
        genderLabel: 'Sexe',
        campusLabel: 'Campus',
        enrollLabel: "Date d'inscription",
        saveStudent: "Enregistrer l'élève",
        cancelBtn: 'Annuler',
        usersTitle: 'Utilisateurs',
        deleteBtn: 'Supprimer',
        youLabel: '(vous)',
        changePass: 'Changer le mot de passe',
        newPassPlaceholder: 'Nouveau mot de passe',
        savePass: 'Enregistrer',
        allCampus: '— Campus —',
        allGender: '— Sexe —',
        allCategory: '— Catégorie —'
      }
    };

    let lang = 'en';
    let allStudents = [];
    let allStaff = [];
    let currentDetail = null;
    let currentType = null;
    let token = localStorage.getItem('token') || null;
    let loginLang = 'en';

    const loginI18n = {
      en: { title: '🏫 School Dashboard', subtitle: 'Sign in to continue', email: 'Email', password: 'Password', btn: 'Sign in' },
      es: { title: '🏫 Panel Escolar', subtitle: 'Inicia sesión para continuar', email: 'Correo electrónico', password: 'Contraseña', btn: 'Entrar' },
      fr: { title: '🏫 Tableau de bord', subtitle: 'Connectez-vous pour continuer', email: 'Email', password: 'Mot de passe', btn: 'Se connecter' }
    };

    function setLoginLang(l) {
      loginLang = l;
      ['en', 'es', 'fr'].forEach(x => document.getElementById('login-btn-' + x).classList.remove('active'));
      document.getElementById('login-btn-' + l).classList.add('active');
      const t = loginI18n[l];
      document.querySelector('#login-page h2').textContent = t.title;
      document.getElementById('login-subtitle').textContent = t.subtitle;
      document.getElementById('login-label-email').textContent = t.email;
      document.getElementById('login-label-password').textContent = t.password;
      document.getElementById('login-btn-submit').textContent = t.btn;
    }

    // --- AUTH ---

    async function doLogin() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      document.getElementById('login-error').textContent = '';
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.error) {
        document.getElementById('login-error').textContent = data.error;
        return;
      }
      token = data.token;
      localStorage.setItem('token', token);
      localStorage.setItem('userEmail', data.user);
      showDashboard(data.user);
    }

    function doLogout() {
      token = null;
      localStorage.removeItem('token');
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('login-page').style.display = 'flex';
    }

    function showDashboard(userEmail) {
      document.getElementById('login-page').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      const adminBtn = document.getElementById('nav-admin');
      if (userEmail === 'yurii@iasofoundation.org') {
        adminBtn.style.display = 'inline-block';
      } else {
        adminBtn.style.display = 'none';
      }
      setLang(loginLang);
      loadData();
    }

    async function createUser() {
      const email = document.getElementById('new-email').value;
      const password = document.getElementById('new-password').value;
      const msgEl = document.getElementById('admin-msg');
      msgEl.textContent = '';
      const res = await fetch('/api/auth/create-user', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.error) {
        msgEl.innerHTML = `<div class="login-error">${data.error}</div>`;
      } else {
        msgEl.innerHTML = `<div class="success-msg">✅ Користувача ${data.user} створено!</div>`;
        document.getElementById('new-email').value = '';
        document.getElementById('new-password').value = '';
      }
    }
    async function loadUsers() {
      const res = await fetch('/api/auth/users', { headers: authHeaders() });
      const users = await res.json();
      const container = document.getElementById('users-list');
      const currentEmail = localStorage.getItem('userEmail');
      const t = i18n[lang];
      document.getElementById('admin-users-title').textContent = '👥 ' + t.usersTitle;
      container.innerHTML = users.map(u => `
        <div class="user-item" style="flex-direction: column; align-items: flex-start; gap: 8px;">
          <div style="display:flex; justify-content:space-between; width:100%; align-items:center;">
            <div>
              <div class="user-email">${u.email}</div>
              <div class="user-date">${new Date(u.created_at).toLocaleDateString()}</div>
            </div>
            <div style="display:flex; gap:8px;">
              <button class="delete-btn" style="border-color:#1a1a2e; color:#1a1a2e;" onclick="togglePasswordField('${u.id}')">🔑 ${t.changePass || 'Change password'}</button>
              ${u.email !== currentEmail
          ? `<button class="delete-btn" onclick="deleteUser('${u.id}', '${u.email}')">🗑 ${t.deleteBtn}</button>`
          : `<span style="font-size:0.8rem;color:#aaa">${t.youLabel}</span>`}
            </div>
          </div>
          <div id="pass-field-${u.id}" style="display:none; width:100%; display:none;">
            <div style="display:flex; gap:8px; margin-top:4px;">
              <input type="password" id="pass-input-${u.id}" placeholder="${t.newPassPlaceholder || 'New password'}" autocomplete="off"
                style="flex:1; padding:7px 12px; border:1px solid #ddd; border-radius:6px; font-size:0.85rem;">
              <button class="delete-btn" style="border-color:#2e7d32; color:#2e7d32;" onclick="changePassword('${u.id}')">✓ ${t.savePass || 'Save'}</button>
            </div>
            <div id="pass-msg-${u.id}" style="font-size:0.8rem; margin-top:4px;"></div>
          </div>
        </div>
      `).join('');
    }

    async function deleteUser(id, email) {
      if (!confirm(`Delete user ${email}?`)) return;
      const res = await fetch(`/api/auth/users/${id}`, {
        method: 'DELETE',
        headers: authHeaders()
      });
      const data = await res.json();
      if (data.error) {
        alert('Error: ' + data.error);
      } else {
        loadUsers();
      }
    }
    function togglePasswordField(id) {
      const field = document.getElementById('pass-field-' + id);
      field.style.display = field.style.display === 'none' ? 'block' : 'none';
    }

    async function changePassword(id) {
      const password = document.getElementById('pass-input-' + id).value;
      const msgEl = document.getElementById('pass-msg-' + id);
      if (password.length < 6) {
        msgEl.style.color = '#e94560';
        msgEl.textContent = '⚠️ ' + (i18n[lang].minChars || 'Minimum 6 characters');
        return;
      }
      const res = await fetch(`/api/auth/users/${id}/password`, {
        method: 'PATCH',
        headers: { ...authHeaders(), 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });
      const data = await res.json();
      if (data.error) {
        msgEl.style.color = '#e94560';
        msgEl.textContent = '❌ ' + data.error;
      } else {
        msgEl.style.color = '#2e7d32';
        msgEl.textContent = '✅ ' + (i18n[lang].savePass || 'Saved') + '!';
        document.getElementById('pass-input-' + id).value = '';
        setTimeout(() => {
          document.getElementById('pass-field-' + id).style.display = 'none';
          msgEl.textContent = '';
        }, 2000);
      }
    }
    // --- HELPERS ---

    function authHeaders() {
      return { 'Authorization': 'Bearer ' + token };
    }

    function formatDate(d) {
      if (!d) return '';
      const [y, m, day] = d.split('-');
      return `${day}/${m}/${y}`;
    }

    function translateStatus(val) {
      if (!val) return '';
      const v = val.toLowerCase();
      const t = i18n[lang];
      if (v.includes('inactivo') || v.includes('inactive')) return t.inactive;
      if (v.includes('activo') || v.includes('active')) return t.active;
      return val;
    }

    function translateGender(val) {
      if (!val) return '';
      const v = val.toLowerCase();
      const t = i18n[lang];
      if (v.includes('femenino') || v.includes('female')) return t.female;
      if (v.includes('masculino') || v.includes('male')) return t.male;
      return val;
    }
    function translateCategoria(val) {
      if (!val) return '';
      const v = val.toLowerCase();
      const map = {
        en: { maestro: 'Teacher', administración: 'Administration', soporte: 'Support' },
        es: { maestro: 'Maestro', administración: 'Administración', soporte: 'Soporte' },
        fr: { maestro: 'Enseignant', administración: 'Administration', soporte: 'Support' }
      };
      const t = map[lang];
      if (v.includes('maestro')) return t.maestro;
      if (v.includes('administración') || v.includes('administracion')) return t.administración;
      if (v.includes('soporte')) return t.soporte;
      return val;
    }
    function goHome() { showPage('home'); }

    function goPage(type) {
      showPage(type);
      if (type === 'admin') {
        loadUsers();
      } else {
        document.getElementById('search-' + type).value = '';
        filterList(type);
      }
    }

    function showPage(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + page).classList.add('active');
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      if (page !== 'home') document.getElementById('nav-' + page).classList.add('active');
    }

    function setLang(l) {
      lang = l;
      ['en', 'es', 'fr'].forEach(x => document.getElementById('btn-' + x).classList.remove('active'));
      document.getElementById('btn-' + l).classList.add('active');
      const t = i18n[l];
      document.getElementById('header-title').textContent = t.title;
      document.getElementById('label-students').textContent = t.students;
      document.getElementById('label-staff').textContent = t.staff;
      document.getElementById('title-students').textContent = t.students;
      document.getElementById('title-staff').textContent = t.staff;
      document.getElementById('search-students').placeholder = t.search;
      document.getElementById('search-staff').placeholder = t.search;
      document.getElementById('nav-students').textContent = t.students;
      document.getElementById('nav-staff').textContent = t.staff;
      document.getElementById('nav-admin').textContent = t.admin;
      document.querySelector('.logout-btn').textContent = t.logout;
      document.querySelector('#page-admin .admin-box h2').textContent = t.adminTitle;
      document.querySelector('#new-email').placeholder = 'user@school.com';
      document.querySelector('#new-email').previousElementSibling.textContent = t.newEmail;
      document.querySelector('#new-password').placeholder = t.minChars;
      document.querySelector('#new-password').previousElementSibling.textContent = t.newPassword;
      document.querySelector('#page-admin .btn-primary').textContent = t.createBtn;
      renderList('students', allStudents);
      renderList('staff', allStaff);
      document.getElementById('btn-add-student').textContent = t.addStudent;
      populateFilters();
      if (document.getElementById('page-admin').classList.contains('active')) {
        loadUsers();
      }
    }

    async function loadData() {
      const [statsRes, studentsRes, staffRes] = await Promise.all([
        fetch('/api/stats', { headers: authHeaders() }),
        fetch('/api/students', { headers: authHeaders() }),
        fetch('/api/staff', { headers: authHeaders() })
      ]);
      const stats = await statsRes.json();
      const studentsData = await studentsRes.json();
      const staffData = await staffRes.json();

      if (stats.error || studentsData.error) {
        doLogout();
        return;
      }

      allStudents = Array.isArray(studentsData) ? studentsData : [];
      allStaff = Array.isArray(staffData) ? staffData : [];

      document.getElementById('students-count').textContent = stats.students ?? '—';
      document.getElementById('staff-count').textContent = stats.staff ?? '—';
      populateFilters();
      renderList('students', allStudents);
      renderList('staff', allStaff);
    }

    function renderList(type, data) {
      const container = document.getElementById('list-' + type);
      container.innerHTML = data.map(p => `
        <div class="person-item" onclick="openDetail('${type}', ${p.id})">
          <div>
            <div class="name">${p.apellido}, ${p.nombre}</div>
            <div class="sub">${p.campus || ''}</div>
          </div>
          ${type === 'students'
          ? `<span class="badge ${p.activo && p.activo.toLowerCase().includes('inactivo') ? 'inactive' : ''}">${translateStatus(p.activo)}</span>`
          : `<span class="sub">${translateCategoria(p.categoria)}</span>`}
        </div>
      `).join('');
    }
    function populateFilters() {
      const t = i18n[lang];

      // Campus для students
      const sCampuses = [...new Set(allStudents.map(p => p.campus).filter(Boolean))].sort();
      const sCampusEl = document.getElementById('filter-students-campus');
      sCampusEl.innerHTML = `<option value="">${t.allCampus}</option>` +
        sCampuses.map(c => `<option value="${c}">${c}</option>`).join('');

      // Стать для students
      const sexEl = document.getElementById('filter-students-sex');
      const sexes = [...new Set(allStudents.map(p => p.sexo).filter(Boolean))].sort();
      sexEl.innerHTML = `<option value="">${t.allGender}</option>` +
        sexes.map(s => `<option value="${s}">${translateGender(s)}</option>`).join('');

      // Campus для staff
      const stCampuses = [...new Set(allStaff.map(p => p.campus).filter(Boolean))].sort();
      const stCampusEl = document.getElementById('filter-staff-campus');
      stCampusEl.innerHTML = `<option value="">${t.allCampus}</option>` +
        stCampuses.map(c => `<option value="${c}">${c}</option>`).join('');

      // Категорія для staff
      const cats = [...new Set(allStaff.map(p => p.categoria).filter(Boolean))].sort();
      const catEl = document.getElementById('filter-staff-category');
      catEl.innerHTML = `<option value="">${t.allCategory}</option>` +
        cats.map(c => `<option value="${c}">${translateCategoria(c)}</option>`).join('');
    }

    function filterList(type) {
      const query = document.getElementById('search-' + type).value.toLowerCase();
      const clearBtn = document.getElementById('clear-' + type);
      clearBtn.style.display = query ? 'block' : 'none';
      const data = type === 'students' ? allStudents : allStaff;

      const campusVal = document.getElementById('filter-' + type + '-campus').value;

      let filtered = data.filter(p =>
        (p.nombre + ' ' + p.apellido).toLowerCase().includes(query) ||
        (p.campus || '').toLowerCase().includes(query)
      );

      if (campusVal) {
        filtered = filtered.filter(p => (p.campus || '') === campusVal);
      }

      if (type === 'students') {
        const sexVal = document.getElementById('filter-students-sex').value;
        if (sexVal) filtered = filtered.filter(p => (p.sexo || '') === sexVal);
      } else {
        const catVal = document.getElementById('filter-staff-category').value;
        if (catVal) filtered = filtered.filter(p => (p.categoria || '') === catVal);
      }

      renderList(type, filtered);
    }

    function clearSearch(type) {
      document.getElementById('search-' + type).value = '';
      document.getElementById('clear-' + type).style.display = 'none';
      renderList(type, type === 'students' ? allStudents : allStaff);
    }

    function renderModal(type, p) {
      const t = i18n[lang];
      document.getElementById('modal-name').textContent = `${p.apellido}, ${p.nombre}`;
      const fields = type === 'students' ? [
        [t.id, p.personal_id],
        [t.campus, p.campus],
        [t.status, translateStatus(p.activo)],
        [t.sexo, translateGender(p.sexo)],
        [t.inscripcion, formatDate(p.fecha_inscripcion)],
        [t.nacimiento, formatDate(p.fecha_nacimiento)],
      ] : [
        [t.id, p.personal_id],
        [t.campus, p.campus],
        [t.category, p.categoria],
        [t.area, p.area_ensenanza],
        [t.laboral, p.estado_laboral],
        [t.inicio, formatDate(p.fecha_inicio)],
      ];
      document.getElementById('modal-content').innerHTML = fields
        .filter(([, v]) => v)
        .map(([label, value]) => `
          <div class="detail-row">
            <div class="detail-label">${label}</div>
            <div class="detail-value">${value}</div>
          </div>
        `).join('');
    }

    async function openDetail(type, id) {
      const res = await fetch(`/api/${type}/${id}`, { headers: authHeaders() });
      const p = await res.json();
      currentDetail = p;
      currentType = type;
      renderModal(type, p);
      document.getElementById('modal-overlay').classList.add('open');
    }

    function closeModal(e) {
      if (!e || e.target === document.getElementById('modal-overlay')) {
        document.getElementById('modal-overlay').classList.remove('open');
        currentDetail = null;
        currentType = null;
      }
    }

    function openAddStudent() {
      const t = i18n[lang];
      document.getElementById('add-student-title').textContent = t.addStudentTitle;
      document.getElementById('label-apellido').textContent = t.lastNameLabel;
      document.getElementById('label-nombre').textContent = t.firstNameLabel;
      document.getElementById('label-dob').textContent = t.dobLabel;
      document.getElementById('label-gender').textContent = t.genderLabel;
      document.getElementById('label-campus-s').textContent = t.campusLabel;
      document.getElementById('label-enroll').textContent = t.enrollLabel;
      document.getElementById('save-student-btn').textContent = t.saveStudent;
      document.getElementById('cancel-student-btn').textContent = t.cancelBtn;
      // Gender options
      const genderEl = document.getElementById('new-gender');
      genderEl.innerHTML = `<option value="Femenino">${t.female}</option><option value="Masculino">${t.male}</option>`;
      // Campus options
      const campusEl = document.getElementById('new-campus-s');
      const campuses = [...new Set(allStudents.map(p => p.campus).filter(Boolean))].sort();
      campusEl.innerHTML = campuses.map(c => `<option value="${c}">${c}</option>`).join('');
      // Clear fields
      document.getElementById('new-apellido').value = '';
      document.getElementById('new-nombre').value = '';
      document.getElementById('new-dob').value = '';
      document.getElementById('new-enroll').value = '';
      document.getElementById('add-student-msg').textContent = '';
      document.getElementById('add-student-overlay').classList.add('open');
    }

    function closeAddStudent(e) {
      if (!e || e.target === document.getElementById('add-student-overlay')) {
        document.getElementById('add-student-overlay').classList.remove('open');
      }
    }

    async function saveStudent() {
      const apellido = document.getElementById('new-apellido').value.trim();
      const nombre = document.getElementById('new-nombre').value.trim();
      const dob = document.getElementById('new-dob').value;
      const sexo = document.getElementById('new-gender').value;
      const campus = document.getElementById('new-campus-s').value;
      const enroll = document.getElementById('new-enroll').value;
      const msgEl = document.getElementById('add-student-msg');

      if (!apellido || !nombre) {
        msgEl.innerHTML = `<div class="login-error">⚠️ Last name and first name are required</div>`;
        return;
      }

      const res = await fetch('/api/students', {
        method: 'POST',
        headers: { ...authHeaders(), 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, apellido, fecha_nacimiento: dob, sexo, campus, fecha_inscripcion: enroll })
      });
      const data = await res.json();
      if (data.error) {
        msgEl.innerHTML = `<div class="login-error">❌ ${data.error}</div>`;
      } else {
        closeAddStudent();
        await loadData();
      }
    }

    // Перевірка при завантаженні — якщо токен є, одразу показуємо дешборд
    if (token) {
      const savedEmail = localStorage.getItem('userEmail') || '';
      showDashboard(savedEmail);
    }
  </script>
</body>

</html>
